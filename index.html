<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Position Sizer — NSE/BSE</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#ecfdf5;--card:#fff;--ib:#f0fdf4;--text:#0d2010;--dim:#5a7a5e;--b:#d1fae5;--g:#16a34a;--gl:rgba(22,163,74,.12);--r:#dc2626;--rl:rgba(220,38,38,.1);--sh:0 4px 24px rgba(0,0,0,.08)}
[data-theme=dark]{--bg:#0a1a0a;--card:#122012;--ib:#1a1a1a;--text:#e8f5e9;--dim:#6b8c6b;--b:#1e3a1e;--g:#22c55e;--gl:rgba(34,197,94,.12);--r:#f87171;--rl:rgba(248,113,113,.1);--sh:0 4px 24px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:44px 18px 72px;transition:background .25s,color .25s}
.w{width:100%;max-width:480px}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.tag{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--g);margin-bottom:4px}
h1{font-size:clamp(30px,8vw,42px);font-weight:800;letter-spacing:-.02em;line-height:1.05}
h1 span{color:var(--g)}
.by{font-size:12px;color:var(--dim);margin-top:4px;font-weight:500}
.thm{width:48px;height:48px;border-radius:14px;border:2px solid var(--b);background:var(--card);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:var(--sh);flex-shrink:0;margin-top:4px}
.thm:hover{border-color:var(--g)}

/* INPUT CARD */
.inp-card{background:var(--card);border-radius:20px;padding:20px;box-shadow:var(--sh);margin-bottom:12px}

/* TOGGLE inside card */
.tog{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:20px}
.tog button{padding:13px;border:none;border-radius:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;background:var(--ib);color:var(--dim)}
.tog button.on{background:var(--g);color:#fff;box-shadow:0 3px 12px var(--gl)}

/* INPUT FIELDS */
.inp-f{margin-bottom:16px}
.inp-f:last-child{margin-bottom:0}
.inp-f label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.inp-f label .opt{font-size:10px;font-weight:600;color:var(--dim);background:var(--ib);padding:2px 7px;border-radius:6px;margin-left:6px}
input[type=number]{width:100%;background:var(--ib);border:2px solid transparent;border-radius:12px;padding:15px 18px;color:var(--text);font-family:inherit;font-size:22px;font-weight:700;outline:none;transition:border-color .2s;-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus{border-color:var(--g)}
input::placeholder{color:var(--dim);font-size:16px;font-weight:400;opacity:.6}

/* ERROR */
.err{display:none;background:var(--rl);border:1.5px solid rgba(220,38,38,.2);color:var(--r);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:600;margin-bottom:12px}

/* RESULTS */
.res{opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s;pointer-events:none}
.res.show{opacity:1;transform:none;pointer-events:all}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.sec-lbl.r{color:var(--r)}.sec-lbl.g{color:var(--g)}

/* STAT CARDS GRID */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.c{background:var(--card);border:2px solid var(--b);border-radius:14px;padding:16px 18px;box-shadow:var(--sh)}
.c.gc{background:var(--gl);border-color:rgba(22,163,74,.25)}
.c.rc{background:var(--rl);border-color:rgba(220,38,38,.2)}
.c .l{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.c .v{font-size:20px;font-weight:800;color:var(--text);line-height:1}
.c .v.g{color:var(--g)}.c .v.r{color:var(--r)}.c .v.xl{font-size:32px}

/* SUMMARY */
.sum{background:var(--card);border:2px solid var(--b);border-radius:14px;padding:14px 18px;box-shadow:var(--sh);font-size:13px;font-weight:500;color:var(--dim);line-height:2}
.sum b{color:var(--text)}.sum .r{color:var(--r)}.sum .g{color:var(--g)}

/* RR BAR */
.rr{background:var(--card);border:2px solid var(--b);border-radius:14px;padding:16px 18px;box-shadow:var(--sh);margin-bottom:10px}
.rr-top{display:flex;justify-content:space-between;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.rr-top b{color:var(--g)}
.track{height:8px;background:var(--ib);border-radius:99px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--r),var(--g));width:0;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.profit{display:none;margin-top:20px}
footer{margin-top:24px;text-align:center;font-size:11px;color:var(--dim);opacity:.5;letter-spacing:.06em}
@media(max-width:360px){.cards{grid-template-columns:1fr}.c .v.xl{font-size:26px}}
</style>
</head>
<body>
<div class="w">

<header>
  <div>
    <p class="tag">NSE / BSE Position Tool</p>
    <h1>Position <span>Sizer</span></h1>
    <p class="by">Designed by Tirth</p>
  </div>
  <button class="thm" id="thm" onclick="toggleTheme()">☽</button>
</header>

<div class="inp-card">
  <div class="tog">
    <button id="bP" class="on" onclick="setMode('price')">₹ SL Price</button>
    <button id="bPct" onclick="setMode('pct')">% SL</button>
  </div>

  <div class="inp-f">
    <label>Buy Price</label>
    <input type="number" id="buyPrice" placeholder="e.g. 1500" min="0" step="any" oninput="calc()"/>
  </div>
  <div class="inp-f" id="cP">
    <label>Stop Loss Price</label>
    <input type="number" id="slPrice" placeholder="e.g. 1440" min="0" step="any" oninput="calc()"/>
  </div>
  <div class="inp-f" id="cPct" style="display:none">
    <label>Stop Loss %</label>
    <input type="number" id="slPct" placeholder="e.g. 4" min="0" max="100" step="any" oninput="calc()"/>
  </div>
  <div class="inp-f">
    <label>Max Loss</label>
    <input type="number" id="maxLoss" placeholder="e.g. 2000" min="0" step="any" oninput="calc()"/>
  </div>
  <div class="inp-f">
    <label>Target Price <span class="opt">Optional</span></label>
    <input type="number" id="target" placeholder="e.g. 1620" min="0" step="any" oninput="calc()"/>
  </div>
</div>

<div class="err" id="err"></div>

<div class="res" id="res">
  <p class="sec-lbl r">Position</p>
  <div class="cards">
    <div class="c rc"><div class="l">SL Price</div><div class="v r" id="rSL">—</div></div>
    <div class="c rc"><div class="l">SL %</div><div class="v r" id="rSLp">—</div></div>
    <div class="c">   <div class="l">Risk / Share</div><div class="v" id="rRPS">—</div></div>
    <div class="c gc"><div class="l">Shares to Buy</div><div class="v g xl" id="rSh">—</div></div>
    <div class="c">   <div class="l">Capital Required</div><div class="v" id="rCap">—</div></div>
    <div class="c rc"><div class="l">Max Risk</div><div class="v r" id="rRisk">—</div></div>
  </div>
  <div class="sum" id="sumBox"></div>

  <div class="profit" id="profSec">
    <p class="sec-lbl g" style="margin-top:20px">Profit</p>
    <div class="cards">
      <div class="c gc"><div class="l">Target Price</div><div class="v g" id="rT">—</div></div>
      <div class="c gc"><div class="l">Profit / Share</div><div class="v g" id="rPPS">—</div></div>
      <div class="c gc"><div class="l">Total Profit</div><div class="v g" id="rTP">—</div></div>
      <div class="c gc"><div class="l">Return %</div><div class="v g" id="rRet">—</div></div>
    </div>
    <div class="rr">
      <div class="rr-top"><span>Risk : Reward</span><b id="rrL">—</b></div>
      <div class="track"><div class="fill" id="rrF"></div></div>
    </div>
  </div>
</div>

<footer>Educational use only · Not financial advice</footer>
</div>

<script>
let dark = false;
let mode = 'price';
document.getElementById('thm').textContent = dark ? '☀' : '☽';

function toggleTheme() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('thm').textContent = dark ? '☀' : '☽';
}

function setMode(m) {
  mode = m;
  document.getElementById('bP').className = m === 'price' ? 'on' : '';
  document.getElementById('bPct').className = m === 'pct' ? 'on' : '';
  document.getElementById('cP').style.display = m === 'price' ? 'block' : 'none';
  document.getElementById('cPct').style.display = m === 'pct' ? 'block' : 'none';
  m === 'price' ? document.getElementById('slPct').value = '' : document.getElementById('slPrice').value = '';
  calc();
}

const rs = n => '₹' + n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
const f  = (id, v) => document.getElementById(id).textContent = v;
const fh = (id, v) => document.getElementById(id).innerHTML = v;
const gv = id => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? NaN : v; };

function showErr(m) { const e = document.getElementById('err'); e.textContent = '⚠ ' + m; e.style.display = 'block'; document.getElementById('res').classList.remove('show'); }
function clrErr()   { document.getElementById('err').style.display = 'none'; }

function calc() {
  const buy = gv('buyPrice'), ml = gv('maxLoss');
  const tv = document.getElementById('target').value.trim();
  const tgt = tv !== '' ? parseFloat(tv) : NaN;

  let sl = NaN;
  if (mode === 'price') sl = gv('slPrice');
  else { const p = gv('slPct'); sl = (!isNaN(buy) && !isNaN(p)) ? buy * (1 - p / 100) : NaN; }

  if (isNaN(buy) || isNaN(sl) || isNaN(ml)) { clrErr(); document.getElementById('res').classList.remove('show'); return; }
  if (buy <= 0)  return showErr('Buy price must be > ₹0');
  if (sl  <= 0)  return showErr('SL must be > ₹0');
  if (ml  <= 0)  return showErr('Max loss must be > ₹0');
  if (sl >= buy) return showErr('SL must be below buy price');

  const rps = buy - sl, shares = Math.floor(ml / rps);
  if (shares <= 0) return showErr('Max loss too small for 1 share. Increase max loss or widen SL.');

  const cap = shares * buy, ar = shares * rps, slp = (rps / buy) * 100;
  clrErr();

  f('rSL', rs(sl)); f('rSLp', slp.toFixed(2) + '%'); f('rRPS', rs(rps));
  f('rSh', shares.toLocaleString('en-IN')); f('rCap', rs(cap)); f('rRisk', rs(ar));

  let sum = `Buy <b>${shares.toLocaleString('en-IN')} shares</b> @ <b>${rs(buy)}</b> &middot; SL <span class="r">${rs(sl)}</span> &middot; Risk <span class="r">${rs(ar)}</span>`;

  const ps = document.getElementById('profSec');
  if (!isNaN(tgt) && tgt > buy) {
    const pps = tgt - buy, tp = shares * pps, ret = (pps / buy) * 100, rr = pps / rps;
    f('rT', rs(tgt)); f('rPPS', rs(pps)); f('rTP', rs(tp)); f('rRet', ret.toFixed(2) + '%');
    document.getElementById('rrF').style.width = Math.min((rr / 5) * 100, 100) + '%';
    document.getElementById('rrL').textContent = '1 : ' + rr.toFixed(2);
    sum += ` &middot; Target <span class="g">${rs(tgt)}</span> &middot; Profit <span class="g">${rs(tp)}</span> &middot; R:R <span class="g">1:${rr.toFixed(2)}</span>`;
    ps.style.display = 'block';
  } else ps.style.display = 'none';

  fh('sumBox', sum);
  document.getElementById('res').classList.add('show');
}
</script>
</body>
</html>
